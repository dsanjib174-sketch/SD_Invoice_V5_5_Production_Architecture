<!doctype html>
<html>
<head>
    <title>SMART DADA SOLUTION Login</title>
    <link rel="icon" href="/static/icons/mobile-icon.png">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">
<div class="login-card">
    <img class="login-logo" src="/static/img/smart_data_final_logo.png">
    <h1>Hello there! 👋</h1>
    <form method="post">
        <label>Registered Email</label>
        <input name="email" placeholder="Client email">
        <label>Branch</label>
        <select name="branch_id"><option>Main Branch</option></select>
        <label>User ID</label>
        <input name="user_id" placeholder="User ID">
        <label>Password</label>
        <input type="password" name="password" placeholder="Password">
        <button>Login</button>
    </form>
    <a href="/forgot-password">Forgot password?</a>
</div>
<div class="update-panel">
    <h2>Welcome to SMART DADA SOLUTION</h2>
    <p>Professional invoice, GST and SaaS ERP platform.</p>
    <strong>V5.5</strong>
</div>
</body>
</html>
