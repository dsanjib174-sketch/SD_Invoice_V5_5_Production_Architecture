<!doctype html>
<html>
<head>
<title>Professional Invoice</title>
<link rel="stylesheet" href="/static/css/invoice.css">
</head>
<body>
<div class="invoice">
    <h2>Tax Invoice</h2>
    <table>
        <tr>
            <td colspan="4"><img src="/static/img/smart_data_final_logo.png" class="invoice-logo"><b>SMART DATA SOLUTION</b><br>Company Address<br>GSTIN:</td>
            <td colspan="2"><b>Invoice No.</b><br>INV/001<br><b>Place of Supply</b><br>24-Gujarat</td>
            <td colspan="2"><b>Date</b><br>DD-MM-YYYY<br><b>PO Date</b><br>DD-MM-YYYY</td>
        </tr>
        <tr>
            <td colspan="4"><b>Bill To</b><br>Customer Details</td>
            <td colspan="4"><b>Ship To</b><br>Shipping Details</td>
        </tr>
        <tr>
            <th>#</th><th>Item Name</th><th>HSN/SAC</th><th>Quantity</th><th>Unit</th><th>Price/Unit</th><th>GST</th><th>Amount</th>
        </tr>
        <tr>
            <td>1</td><td>Sample Item</td><td>0000</td><td>1</td><td>Nos</td><td>₹0.00</td><td>₹0.00</td><td>₹0.00</td>
        </tr>
    </table>
</div>
</body>
</html>
